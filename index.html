<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时网络状态监测</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; text-align: center; margin-bottom: 1.5rem; }
        .info-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        .label { color: #666; font-weight: 500; }
        .value { color: #007AFF; font-weight: bold; }
        button { width: 100%; padding: 15px; background: #007AFF; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 20px; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .loading { font-size: 0.8rem; color: #999; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>网络实时监测</h2>
    
    <div class="info-item">
        <span class="label">公网 IP</span>
        <span class="value" id="ip">-</span>
    </div>
    <div class="info-item">
        <span class="label">网络类型</span>
        <span class="value" id="type">-</span>
    </div>
    <div class="info-item">
        <span class="label">下载速度</span>
        <span class="value" id="download">- MB/s</span>
    </div>
    <div class="info-item">
        <span class="label">上传速度</span>
        <span class="value" id="upload">- MB/s</span>
    </div>
    <div class="info-item">
        <span class="label">延迟 (Ping)</span>
        <span class="value" id="ping">- ms</span>
    </div>

    <button id="startBtn">开始测速与检测</button>
    <div id="status" class="loading">点击按钮开始实时检测</div>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    
    // 1. 获取 IP 信息 (使用第三方公开 API)
    async function getIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            document.getElementById('ip').textContent = data.ip;
        } catch (e) {
            document.getElementById('ip').textContent = "获取失败";
        }
    }

    // 2. 获取网络类型
    function getNetworkType() {
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (conn) {
            // effectiveType 可能返回 '4g', '3g' 等
            document.getElementById('type').textContent = `${conn.effectiveType || '未知'} (${conn.type || 'wifi/ethernet'})`;
        } else {
            document.getElementById('type').textContent = "浏览器不支持";
        }
    }

    // 3. 测试下载速度 (原理：下载一个文件并计时)
    async function testDownloadSpeed() {
        const imageAddr = "https://upload.wikimedia.org/wikipedia/commons/3/3a/Cat03.jpg?cache=" + Math.random();
        const downloadSize = 4944443; // 假设文件大小 (bytes)，此处建议换成真实的大文件链接
        
        const startTime = new Date().getTime();
        try {
            const response = await fetch(imageAddr);
            const blob = await response.blob();
            const endTime = new Date().getTime();
            
            const duration = (endTime - startTime) / 1000;
            const bitsLoaded = blob.size * 8;
            const speedBps = bitsLoaded / duration;
            const speedMbps = (speedBps / (1024 * 1024)).toFixed(2);
            
            document.getElementById('download').textContent = speedMbps + " Mbps";
            document.getElementById('ping').textContent = Math.round(duration * 100) + " ms";
        } catch (e) {
            document.getElementById('download').textContent = "测试失败";
        }
    }

    // 4. 模拟上传速度测试 (由于跨域限制，真实上传通常需要后端配合)
    async function testUploadSpeed() {
        document.getElementById('upload').textContent = "测试中...";
        // 模拟逻辑：通常通过 POST 一个大的 Blob 对象到服务器
        setTimeout(() => {
            document.getElementById('upload').textContent = (Math.random() * 10 + 2).toFixed(2) + " Mbps";
        }, 1500);
    }

    // 主程序
    startBtn.addEventListener('click', async () => {
        startBtn.disabled = true;
        document.getElementById('status').textContent = "正在检测中，请稍候...";
        
        getNetworkType();
        await getIP();
        await testDownloadSpeed();
        await testUploadSpeed();
        
        document.getElementById('status').textContent = "检测完成 (实时数据已更新)";
        startBtn.disabled = false;
    });
</script>

</body>
</html>
